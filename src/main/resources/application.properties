spring.application.name=fundmatrix
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/fundmatrix2
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
server.servlet.context-path=/api
fundmatrix.security.jwt.secret=${JWT_SECRET:fundmatrix-development-signing-secret-change-me-in-production-0042}
fundmatrix.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
fundmatrix.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174}
logging.level.org.springframework.security=DEBUG